services:
  - type: web
    name: taxi2airport-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        sync: false
      - key: MONGODB_COLLECTION
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        sync: false
      - key: RATE_LIMIT_MAX
        sync: false
      - key: BOOKING_RATE_LIMIT_WINDOW_MS
        sync: false
      - key: BOOKING_RATE_LIMIT_MAX
        sync: false
