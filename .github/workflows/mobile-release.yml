name: Mobile release

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
  workflow_dispatch: {}

concurrency:
  group: mobile-release
  cancel-in-progress: false

jobs:
  changes:
    name: Detect what changed
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - 'apps/mobile/package.json'
              - 'apps/mobile/package-lock.json'
              - 'apps/mobile/app.json'
              - 'apps/mobile/eas.json'

  eas-update:
    name: Publish OTA update
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Missing EXPO_TOKEN repo secret -- see apps/mobile/CLAUDE.md for setup steps."
            exit 1
          fi

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish update
        run: eas update --branch production --auto --non-interactive

  eas-build:
    name: Build APK and publish release
    needs: changes
    if: needs.changes.outputs.native == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Missing EXPO_TOKEN repo secret -- see apps/mobile/CLAUDE.md for setup steps."
            exit 1
          fi

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive --json > build-output.json

      - name: Extract artifact URL
        id: artifact
        run: |
          URL=$(node -e "console.log(require('./build-output.json')[0].artifacts.buildUrl)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: curl -L -o taxi2airport-admin.apk "${{ steps.artifact.outputs.url }}"

      - name: Publish/update the mobile-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-latest
          name: Taxi2Airport Admin (latest build)
          body: |
            Always-current Android build. This link never changes -- re-download here any time a fresh install is needed.
            Most updates ship automatically over the air; you only need to reinstall from this link when this release's date changes.
          files: apps/mobile/taxi2airport-admin.apk
